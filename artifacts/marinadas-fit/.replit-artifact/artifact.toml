kind = "web"
previewPath = "/"
title = "Marinadas Fit"
version = "1.0.0"
id = "artifacts/marinadas-fit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20618

[services.development]
run = "pnpm --filter @workspace/marinadas-fit run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/marinadas-fit", "run", "build" ]
publicDir = "artifacts/marinadas-fit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20618"
BASE_PATH = "/"
